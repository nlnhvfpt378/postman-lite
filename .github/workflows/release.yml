name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without leading v, e.g. 0.3.0'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo 'Version is empty' >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@v2.5.4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            xorg-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libasound2-dev \
            gcc-mingw-w64-x86-64 \
            clang \
            clang++ \
            llvm \
            libosxcross-clang-dev \
            zip

      - name: Go mod tidy
        run: go mod tidy

      - name: Build archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GO_BIN: go
          FYNE_BIN: /home/runner/go/bin/fyne
          APP_ID: io.github.nlnhvfpt378.postmanlite
        run: bash ./build/package-cross.sh

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            deliverables/postman-lite_${{ steps.version.outputs.version }}_linux_amd64.tar.gz
            deliverables/postman-lite_${{ steps.version.outputs.version }}_windows_amd64.zip
            deliverables/postman-lite_${{ steps.version.outputs.version }}_darwin_amd64.tar.gz
            deliverables/postman-lite_${{ steps.version.outputs.version }}_darwin_arm64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
