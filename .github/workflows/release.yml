name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without leading v, e.g. 0.3.0'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo 'Version is empty' >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build deps (Linux/Windows)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            xorg-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libasound2-dev \
            gcc-mingw-w64-x86-64 \
            zip

      - name: Go mod tidy
        run: go mod tidy

      - name: Build Linux + Windows archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GO_BIN: go
          TARGETS: linux windows
        run: bash ./build/package-cross.sh

      - name: Upload Linux/Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-windows
          path: |
            deliverables/postman-lite_${{ steps.version.outputs.version }}_linux_amd64.tar.gz
            deliverables/postman-lite_${{ steps.version.outputs.version }}_windows_amd64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo 'Version is empty' >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@v2.5.4

      - name: Go mod tidy
        run: go mod tidy

      - name: Build macOS archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GO_BIN: go
          FYNE_BIN: /Users/runner/go/bin/fyne
          APP_ID: io.github.nlnhvfpt378.postmanlite
          TARGETS: darwin_amd64 darwin_arm64
        run: bash ./build/package-cross.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            deliverables/postman-lite_${{ steps.version.outputs.version }}_darwin_amd64.tar.gz
            deliverables/postman-lite_${{ steps.version.outputs.version }}_darwin_arm64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build-linux-windows, build-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo 'Version is empty' >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Linux/Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux-windows
          path: deliverables

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: deliverables

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            deliverables/postman-lite_${{ steps.version.outputs.version }}_linux_amd64.tar.gz
            deliverables/postman-lite_${{ steps.version.outputs.version }}_windows_amd64.zip
            deliverables/postman-lite_${{ steps.version.outputs.version }}_darwin_amd64.tar.gz
            deliverables/postman-lite_${{ steps.version.outputs.version }}_darwin_arm64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
